[workspace]
authors = ["Nacef Guessaymi <nacefguess@hotmail.com>"]
channels = ["conda-forge"]
name = "pharmit"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = { cmd = "bash install.sh", description = "full build from a clean checkout" }
fixenv = { cmd = "bash fix-env.sh", description = "re-apply env-side fixes after a pixi install" }
build-smina = { cmd = "bash build-smina.sh", depends-on = ["fixenv"], description = "Build libsmina.a (disable bundled Eigen, configure + compile smina)" }
build-pharmit = { cmd = "bash build-pharmit.sh", depends-on = ["build-smina"], description = "Configure + build the pharmit CLI against libsmina.a" }
clean = { cmd = "rm -rf build external/smina/build", description = "Remove build directories (pharmit + smina)" }
rebuild = { cmd = "echo rebuilt", depends-on = ["clean", "build-pharmit"], description = "Clean then rebuild everything" }
test = { cmd = "bash test.sh", description = "Smoke test (needs network): fetch an SDF and run the pharmacophore engine" }

[dependencies]
cmake = ">=4.3.3,<5"
cxx-compiler = ">=1.11.0,<2"
c-compiler = ">=1.11.0,<2"
make = ">=4.4.1,<5"
boost-cpp = ">=1.85.0,<2"
eigen = ">=5.0.1,<6"
openbabel = ">=3.1.1,<4"
glpk = ">=5.0,<6"
cairo = ">=1.18.4,<2"
jsoncpp = ">=1.9.7,<2"
gperftools = ">=2.18.1,<3"
libcurl = ">=8.20.0,<9"
swig = ">=4.4.1,<5"
libxml2 = ">=2.13.9,<3"
coincbc = ">=2.10.13,<3"
lemon = ">=1.3.1,<2"
ann = ">=1.1.3,<2"
bitmagic = ">=7.13.4,<8"
